name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          # Exclude dev/CI files from the zip
          zip -r chrome-stock-monitor.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".DS_Store" \
            -x "node_modules/*" \
            -x "*.log"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "chrome-stock-monitor.zip"
          generate_release_notes: true
