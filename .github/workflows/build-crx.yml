name: Build CRX

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build CRX
        run: |
          npx crx3 --zip . --key /dev/null -o chrome-stock-monitor.crx || \
          (apt-get update && apt-get install -y chromium-browser && \
           chromium-browser --pack-extension=. --pack-extension-key=/dev/null)
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.crx"
          generate_release_notes: true
